name: Repo Health Report

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Detailed Health Report
        run: |
          echo "### 📊 Repository Health Report" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY

          echo "#### 🔍 Summary of Checks" >> $GITHUB_STEP_SUMMARY

          # Web / JS
          echo "##### 🌐 Node.js Projects" >> $GITHUB_STEP_SUMMARY
          find . -name "package.json" -not -path "*/node_modules/*" | while read pkg; do
            dir=$(dirname "$pkg")
            echo "Project: $dir" >> $GITHUB_STEP_SUMMARY
            cd "$dir"
            npm outdated || true >> $GITHUB_STEP_SUMMARY
            cd -
          done

          # Open PRs
          echo "##### 📬 Open Pull Requests" >> $GITHUB_STEP_SUMMARY
          gh pr list --state open --json number,title,author,statusCheckRollup >> $GITHUB_STEP_SUMMARY || echo "No open PRs" >> $GITHUB_STEP_SUMMARY

          # Security / Vulnerabilities (basic check)
          echo "##### 🛡️ Security Pulse" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high || echo "High vulnerabilities found!" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}
