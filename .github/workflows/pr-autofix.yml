name: PR Autofix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: github.event.pull_request.draft == false && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Multi-language Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Auto-detect and Fix
        run: |
          # Node.js / Web
          find . -name "package.json" -not -path "*/node_modules/*" | while read pkg; do
            dir=$(dirname "$pkg")
            cd "$dir"
            npm install || true
            npm run lint -- --fix || true
            npm test || true
            cd -
          done

          # Solidity
          if find . -name "foundry.toml" | grep -q . || [ -d "contracts" ]; then
             forge fmt || true
             forge build || true
             forge test || true
          fi

          # Python
          if find . -name "*.py" | grep -q .; then
            pip install pytest ruff
            ruff check --fix . || true
            pytest || true
          fi

          # Go
          if find . -name "go.mod" | grep -q .; then
            go fmt ./... || true
            go test ./... || true
          fi

          # Rust
          if find . -name "Cargo.toml" | grep -q .; then
            cargo fmt --all || true
            cargo test || true
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated PR fixes and tests"
